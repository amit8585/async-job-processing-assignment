<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Async Job Processor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }

    header h1 { font-size: 1.4rem; color: #38bdf8; }

    #user-info { font-size: 0.9rem; color: #94a3b8; }

    #logout-btn {
      margin-left: 1rem;
      padding: 0.3rem 0.8rem;
      background: #ef4444;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
    }

    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #1e293b;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #334155;
    }

    .card h2 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
      color: #38bdf8;
      border-bottom: 1px solid #334155;
      padding-bottom: 0.5rem;
    }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 1rem; }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      background: #334155;
      color: #94a3b8;
      transition: background 0.2s;
    }

    .tab-btn:first-child { border-radius: 6px 0 0 6px; }
    .tab-btn:last-child  { border-radius: 0 6px 6px 0; }

    .tab-btn.active {
      background: #38bdf8;
      color: #0f172a;
      font-weight: 600;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Forms */
    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }

    input, select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: #38bdf8; }

    .btn {
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-danger  { background: #ef4444; color: white; }
    .btn-sm      { padding: 0.3rem 0.7rem; font-size: 0.82rem; }

    .alert {
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
    }

    .alert-error   { background: #7f1d1d; color: #fca5a5; }
    .alert-success { background: #14532d; color: #86efac; }
    .alert-info    { background: #1e3a5f; color: #93c5fd; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .badge-PENDING     { background: #78350f; color: #fcd34d; }
    .badge-IN_PROGRESS { background: #1e3a5f; color: #93c5fd; }
    .badge-SUCCESS     { background: #14532d; color: #86efac; }
    .badge-FAILED      { background: #7f1d1d; color: #fca5a5; }

    /* Jobs table */
    .jobs-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }

    .jobs-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      background: #0f172a;
      color: #64748b;
      font-weight: 600;
      border-bottom: 1px solid #334155;
    }

    .jobs-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
    }

    .jobs-table tr:hover td { background: #1e293b; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      justify-content: center;
    }

    .page-btn {
      padding: 0.3rem 0.7rem;
      border: 1px solid #475569;
      background: #1e293b;
      color: #94a3b8;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .page-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 700; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Active job monitor */
    #active-job { display: none; }

    .progress-bar-outer {
      height: 6px;
      background: #334155;
      border-radius: 999px;
      overflow: hidden;
      margin: 0.5rem 0;
    }

    .progress-bar-inner {
      height: 100%;
      background: #38bdf8;
      border-radius: 999px;
      animation: indeterminate 1.4s infinite ease-in-out;
      width: 40%;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .hidden { display: none !important; }

    /* Filter row */
    .filter-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .filter-row .form-group { margin-bottom: 0; flex: 1; min-width: 140px; }

    code {
      background: #0f172a;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #34d399;
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ Async Job Processor</h1>
  <div id="user-info">
    <span id="username-display"></span>
    <button id="logout-btn" class="hidden">Logout</button>
  </div>
</header>

<main>
  <!-- AUTH SECTION -->
  <section id="auth-section">
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login -->
      <div id="tab-login" class="tab-panel active">
        <div id="login-alert"></div>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
      </div>

      <!-- Register -->
      <div id="tab-register" class="tab-panel">
        <div id="register-alert"></div>
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" required minlength="3" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>
    </div>
  </section>

  <!-- APP SECTION (shown when logged in) -->
  <section id="app-section" class="hidden">

    <!-- Submit Job -->
    <div class="card">
      <h2>Submit New Job</h2>
      <div id="submit-alert"></div>
      <form onsubmit="handleSubmitJob(event)">
        <div class="form-group">
          <label>Numbers (comma-separated)</label>
          <input type="text" id="job-data" placeholder="e.g. 1, 2, 3, 4, 5" required />
        </div>
        <div class="form-group">
          <label>Operation</label>
          <select id="job-operation">
            <option value="square_sum">Square Sum — Σ(x²)</option>
            <option value="cube_sum">Cube Sum — Σ(x³)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Submit Job</button>
      </form>
    </div>

    <!-- Active Job Monitor -->
    <div class="card" id="active-job">
      <h2>Active Job</h2>
      <div id="active-job-content"></div>
    </div>

    <!-- Jobs List -->
    <div class="card">
      <h2>My Jobs</h2>

      <div class="filter-row">
        <div class="form-group">
          <label>Filter by Status</label>
          <select id="filter-status" onchange="fetchJobs(1)">
            <option value="">All</option>
            <option value="PENDING">Pending</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="SUCCESS">Success</option>
            <option value="FAILED">Failed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Filter by Operation</label>
          <select id="filter-operation" onchange="fetchJobs(1)">
            <option value="">All</option>
            <option value="square_sum">Square Sum</option>
            <option value="cube_sum">Cube Sum</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="fetchJobs(currentPage)" style="margin-bottom:0">Refresh</button>
      </div>

      <div id="jobs-alert"></div>
      <div id="jobs-table-container">
        <p style="color:#64748b">Loading jobs...</p>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</main>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let token = localStorage.getItem('jwt_token') || null;
  let currentUsername = localStorage.getItem('username') || null;
  let currentPage = 1;
  let pollingTimer = null;
  let activeJobId = null;

  const API = '';  // same origin

  // ── Init ───────────────────────────────────────────────────────────────────
  (function init() {
    if (token) {
      showApp();
      fetchJobs(1);
    } else {
      showAuth();
    }
  })();

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function showAuth() {
    document.getElementById('auth-section').classList.remove('hidden');
    document.getElementById('app-section').classList.add('hidden');
    document.getElementById('logout-btn').classList.add('hidden');
    document.getElementById('username-display').textContent = '';
  }

  function showApp() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('app-section').classList.remove('hidden');
    document.getElementById('logout-btn').classList.remove('hidden');
    document.getElementById('username-display').textContent = `👤 ${currentUsername}`;
    document.getElementById('logout-btn').onclick = logout;
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function alert(containerId, message, type='error') {
    const el = document.getElementById(containerId);
    el.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
  }

  function clearAlert(containerId) {
    document.getElementById(containerId).innerHTML = '';
  }

  function badgeHtml(status) {
    return `<span class="badge badge-${status}">${status.replace('_', ' ')}</span>`;
  }

  function logout() {
    token = null;
    currentUsername = null;
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('username');
    stopPolling();
    document.getElementById('active-job').style.display = 'none';
    showAuth();
  }

  // ── API helpers ────────────────────────────────────────────────────────────
  async function apiFetch(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API + path, { ...options, headers });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  }

  // ── Auth ───────────────────────────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    clearAlert('login-alert');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    const form = new FormData();
    form.append('username', username);
    form.append('password', password);

    const res = await fetch('/auth/login', {
      method: 'POST',
      body: form,
    });
    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      token = data.access_token;
      currentUsername = username;
      localStorage.setItem('jwt_token', token);
      localStorage.setItem('username', username);
      showApp();
      fetchJobs(1);
    } else {
      alert('login-alert', data.detail || 'Login failed', 'error');
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    clearAlert('register-alert');
    const { ok, data } = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        username: document.getElementById('reg-username').value.trim(),
        email: document.getElementById('reg-email').value.trim(),
        password: document.getElementById('reg-password').value,
      }),
    });
    if (ok) {
      alert('register-alert', 'Account created! Please login.', 'success');
      switchTab('login');
      document.getElementById('login-username').value = document.getElementById('reg-username').value;
    } else {
      alert('register-alert', data.detail || 'Registration failed', 'error');
    }
  }

  // ── Job Submission ─────────────────────────────────────────────────────────
  async function handleSubmitJob(e) {
    e.preventDefault();
    clearAlert('submit-alert');

    const raw = document.getElementById('job-data').value;
    const numbers = raw.split(',').map(s => s.trim()).filter(Boolean).map(Number);

    if (numbers.some(isNaN)) {
      alert('submit-alert', 'Please enter valid comma-separated numbers', 'error');
      return;
    }

    const operation = document.getElementById('job-operation').value;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const { ok, data } = await apiFetch('/jobs/', {
      method: 'POST',
      body: JSON.stringify({ data: numbers, operation }),
    });

    btn.disabled = false;
    btn.textContent = 'Submit Job';

    if (ok) {
      alert('submit-alert', `Job submitted! ID: <code>${data.job_id}</code>`, 'success');
      startPolling(data.job_id);
      fetchJobs(1);
    } else {
      alert('submit-alert', data.detail || 'Submission failed', 'error');
    }
  }

  // ── Job Polling ────────────────────────────────────────────────────────────
  function startPolling(jobId) {
    stopPolling();
    activeJobId = jobId;
    const el = document.getElementById('active-job');
    el.style.display = 'block';
    pollJob();
  }

  function stopPolling() {
    if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
  }

  async function pollJob() {
    if (!activeJobId) return;
    const { ok, data } = await apiFetch(`/jobs/${activeJobId}/result`);
    if (!ok) { stopPolling(); return; }

    renderActiveJob(data);

    if (data.status === 'SUCCESS' || data.status === 'FAILED') {
      stopPolling();
      fetchJobs(currentPage);
    } else {
      pollingTimer = setTimeout(pollJob, 2000);
    }
  }

  function renderActiveJob(job) {
    const inProgress = job.status === 'PENDING' || job.status === 'IN_PROGRESS';
    let resultHtml = '';

    if (job.status === 'SUCCESS' && job.result) {
      resultHtml = `<p style="margin-top:0.5rem">Result: <code>${job.result.value}</code></p>`;
    } else if (job.status === 'FAILED' && job.result) {
      resultHtml = `<p style="margin-top:0.5rem;color:#fca5a5">Error: ${job.result.error}</p>`;
    }

    document.getElementById('active-job-content').innerHTML = `
      <p>Job ID: <code>${job.job_id}</code></p>
      <p style="margin-top:0.4rem">Status: ${badgeHtml(job.status)} &nbsp; Operation: <code>${job.operation}</code></p>
      ${inProgress ? `<div class="progress-bar-outer"><div class="progress-bar-inner"></div></div><p style="font-size:0.8rem;color:#64748b">Processing… polling every 2 seconds</p>` : ''}
      ${resultHtml}
    `;
  }

  // ── Jobs List ──────────────────────────────────────────────────────────────
  async function fetchJobs(page) {
    currentPage = page;
    const statusFilter = document.getElementById('filter-status').value;
    const opFilter = document.getElementById('filter-operation').value;

    let url = `/jobs/?page=${page}&page_size=10`;
    if (statusFilter) url += `&status=${statusFilter}`;
    if (opFilter) url += `&operation=${opFilter}`;

    const { ok, data } = await apiFetch(url);
    if (!ok) {
      document.getElementById('jobs-table-container').innerHTML =
        `<div class="alert alert-error">${data.detail || 'Failed to load jobs'}</div>`;
      return;
    }

    renderJobsTable(data);
    renderPagination(data);
  }

  function renderJobsTable(paged) {
    const container = document.getElementById('jobs-table-container');
    if (!paged.items || paged.items.length === 0) {
      container.innerHTML = '<p style="color:#64748b;text-align:center;padding:1rem">No jobs found.</p>';
      return;
    }

    const rows = paged.items.map(job => {
      const result = (job.status === 'SUCCESS' && job.result)
        ? `<code>${job.result.value}</code>`
        : (job.status === 'FAILED' && job.result)
          ? `<span style="color:#fca5a5">${job.result.error}</span>`
          : '—';

      return `<tr>
        <td><code style="font-size:0.75rem">${job.job_id.substring(0,8)}…</code></td>
        <td>${badgeHtml(job.status)}</td>
        <td>${job.operation}</td>
        <td>${result}</td>
        <td>${new Date(job.created_at).toLocaleString()}</td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="viewJobResult('${job.job_id}')">View</button>
          <button class="btn btn-sm btn-danger" onclick="deleteJob('${job.job_id}')" style="margin-left:4px">Del</button>
        </td>
      </tr>`;
    }).join('');

    container.innerHTML = `
      <table class="jobs-table">
        <thead><tr>
          <th>Job ID</th><th>Status</th><th>Operation</th><th>Result</th><th>Created</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderPagination(paged) {
    const el = document.getElementById('pagination');
    if (paged.total_pages <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="fetchJobs(${paged.page - 1})" ${paged.page === 1 ? 'disabled' : ''}>‹ Prev</button>`;

    for (let i = 1; i <= paged.total_pages; i++) {
      html += `<button class="page-btn ${i === paged.page ? 'active' : ''}" onclick="fetchJobs(${i})">${i}</button>`;
    }

    html += `<button class="page-btn" onclick="fetchJobs(${paged.page + 1})" ${paged.page === paged.total_pages ? 'disabled' : ''}>Next ›</button>`;
    el.innerHTML = html;
  }

  async function viewJobResult(jobId) {
    startPolling(jobId);
    document.getElementById('active-job').scrollIntoView({ behavior: 'smooth' });
  }

  async function deleteJob(jobId) {
    if (!confirm('Delete this job?')) return;
    const { ok, data } = await apiFetch(`/jobs/${jobId}`, { method: 'DELETE' });
    if (ok) {
      if (activeJobId === jobId) {
        stopPolling();
        document.getElementById('active-job').style.display = 'none';
      }
      fetchJobs(currentPage);
    } else {
      alert('jobs-alert', data.detail || 'Delete failed', 'error');
    }
  }
</script>
</body>
</html>
