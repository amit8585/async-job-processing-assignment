version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── FastAPI App ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/jobsdb"
      DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@db:5432/jobsdb"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "change-this-secret-key-in-production-at-least-32-chars"
      JOB_EXPIRY_HOURS: "24"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q celery
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/jobsdb"
      DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@db:5432/jobsdb"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "change-this-secret-key-in-production-at-least-32-chars"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Beat (periodic cleanup) ─────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/jobsdb"
      DATABASE_URL_SYNC: "postgresql+psycopg2://postgres:postgres@db:5432/jobsdb"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "change-this-secret-key-in-production-at-least-32-chars"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
